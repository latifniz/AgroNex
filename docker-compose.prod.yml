services:
  psql:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-agronex}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      retries: 5
      timeout: 5s

  s3:
    image: minio/minio:RELEASE.2024-12-13T22-19-12Z
    volumes:
      - asset_s3_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7.0-alpine
    volumes:
      - redis-data:/data
    command: ["redis-server", "--save", "900", "1", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3500:3500"
    environment:
      NODE_ENV: production
      API_INTERNAL_PORT: 3500
      ASSET_URL_PREFIX: ${ASSET_URL_PREFIX}
      DB_HOST: psql
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_DATABASE: ${DB_DATABASE:-agronex}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      USE_MINIO: "true"
      MINIO_ENDPOINT: http://s3:9000
      MINIO_BUCKET: ${MINIO_BUCKET:-vendure-assets}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      MINIO_STORAGE_REGION: us-east-1
      COOKIE_SECRET: ${COOKIE_SECRET}
      LOG_LEVEL: info
    depends_on:
      psql:
        condition: service_healthy
      redis:
        condition: service_healthy
      s3:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      NODE_ENV: production
      DB_HOST: psql
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_DATABASE: ${DB_DATABASE:-agronex}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_LEVEL: info
    depends_on:
      psql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pg-data:
  asset_s3_data:
  redis-data:
